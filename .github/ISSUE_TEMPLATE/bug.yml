name: Pet bug
description: Report an animation, installation, or update problem
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Where is the problem?
      options:
        - Installation or update
        - Animation or sprite
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What happened?
      description: Include your OS, Codex version, action name, and a screenshot if useful.
    validations:
      required: true
